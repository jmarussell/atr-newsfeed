<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asia Tech Review</title>
  <style>
    :root {
      color-scheme: light;
      --border: #dddddd;
      --muted: #666666;
      --text: #111111;
    }

    body {
      margin: 0;
      font-family: Consolas, "Lucida Console", "Courier New", monospace;
      color: var(--text);
      background: #ffffff;
      line-height: 1.45;
    }

    a {
      color: inherit;
      text-decoration: underline;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 26px;
      line-height: 1.1;
      margin: 0;
      font-weight: 700;
    }

    .tagline {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .feed {
      border-top: 1px solid var(--border);
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      margin: 22px 0 8px;
    }

    article {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .blurb {
      font-size: 17px;
      margin: 0;
      max-width: 760px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      margin: 18px 0;
    }

    footer {
      border-top: 1px solid var(--border);
      margin-top: 24px;
      padding-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .page {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Asia Tech Review</h1>
      <p class="tagline">Keeping up with Asia news</p>
    </header>

    <main>
      <p id="status" class="status">Loading news links...</p>
      <section id="feed" class="feed" aria-label="Newsfeed"></section>
    </main>

    <footer>
      <p>Updated from Google Sheets.</p>
    </footer>
  </div>

  <script>
    /*
      Google Sheet setup:
      1. Create a sheet with columns: Date, Blurb, Source, URL
      2. In Google Sheets, use File -> Share -> Publish to web
      3. Publish the sheet as CSV
      4. Replace the URL below with the published CSV link

      Example rows:
      Date,Blurb,Source,URL
      2026-07-13,South Korea's SK Hynix closed 13% higher on its US debut after raising $26.5 billion through a Nasdaq ADR offering,Bloomberg,https://example.com
      2026-07-13,Indian premium grocery startup FirstClub raised a $55 million Series B round led by Peak XV Partners and Sofina at a $255 million valuation,TechCrunch,https://example.com
    */

    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1-9bPUuh73mgFWM1gDc_3qlTe_-VNZGrgRfWMApv8yxU/gviz/tq?tqx=out:csv&gid=0&headers=1";

    const fallbackItems = [
      {
        Date: "2026-07-13",
        Blurb: "South Korea's SK Hynix closed 13% higher on its US debut after raising $26.5 billion through a Nasdaq ADR offering",
        Source: "Bloomberg",
        URL: "https://example.com"
      },
      {
        Date: "2026-07-13",
        Blurb: "Indian premium grocery startup FirstClub raised a $55 million Series B round led by Peak XV Partners and Sofina at a $255 million valuation",
        Source: "TechCrunch",
        URL: "https://example.com"
      },
      {
        Date: "2026-07-12",
        Blurb: "Paste each new item into the Google Sheet as a finished daily blurb, then add the source name and link in the next columns",
        Source: "Source Name",
        URL: "https://example.com"
      }
    ];

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          value += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (value || row.length) {
            row.push(value);
            rows.push(row);
            row = [];
            value = "";
          }
          if (char === "\r" && next === "\n") {
            i += 1;
          }
        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }

      if (!rows.length) {
        return [];
      }

      const headers = rows.shift().map((header) => header.trim());
      return rows
        .filter((cells) => cells.some((cell) => cell.trim()))
        .map((cells) => {
          const item = {};
          headers.forEach((header, index) => {
            item[header] = (cells[index] || "").trim();
          });
          return item;
        });
    }

    function formatDate(dateValue) {
      if (!dateValue) {
        return "Undated";
      }

      const date = new Date(dateValue);
      if (Number.isNaN(date.getTime())) {
        return dateValue;
      }

      return date.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function renderFeed(items, note) {
      const feed = document.getElementById("feed");
      const status = document.getElementById("status");
      feed.textContent = "";
      status.textContent = note || "";

      let currentDate = "";

      items.forEach((item) => {
        const displayDate = formatDate(item.Date);
        if (displayDate !== currentDate) {
          currentDate = displayDate;
          const date = document.createElement("p");
          date.className = "date";
          date.textContent = displayDate;
          feed.appendChild(date);
        }

        const article = document.createElement("article");
        const blurb = document.createElement("p");
        blurb.className = "blurb";
        blurb.append(document.createTextNode(item.Blurb + " ["));

        const source = document.createElement("a");
        source.href = item.URL || "#";
        source.textContent = item.Source || "Source";
        source.target = "_blank";
        source.rel = "noopener";

        blurb.appendChild(source);
        blurb.append(document.createTextNode("]"));
        article.appendChild(blurb);
        feed.appendChild(article);
      });
    }

    async function loadFeed() {
      if (!SHEET_CSV_URL || SHEET_CSV_URL.includes("PASTE_PUBLISHED")) {
        renderFeed(fallbackItems, "Sample data shown. Replace SHEET_CSV_URL in index.html with your published Google Sheet CSV link.");
        return;
      }

      try {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) {
          throw new Error("Could not load sheet");
        }

        const text = await response.text();
        const items = parseCsv(text);
        if (!items.length) {
          renderFeed(fallbackItems, "The Google Sheet loaded, but it has no rows yet. Showing sample data.");
          return;
        }
        renderFeed(items, "");
      } catch (error) {
        renderFeed(fallbackItems, "Could not load Google Sheet. Showing sample data.");
      }
    }

    loadFeed();
  </script>
</body>
</html>
